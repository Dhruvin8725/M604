<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Car Rental Management System</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" id="formTitle">Add New Car</h5>
                    <form id="carForm">
                        <input type="hidden" id="carId">
                        <div class="mb-3">
                            <label class="form-label">Make</label>
                            <input type="text" class="form-control" id="make" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Model</label>
                            <input type="text" class="form-control" id="model" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Year</label>
                            <input type="number" class="form-control" id="year" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="isAvailable" checked>
                            <label class="form-check-label">Is Available?</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="saveBtn">Save Car</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelBtn" onclick="resetForm()">Cancel</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Fleet Overview</h5>
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Make</th>
                                <th>Model</th>
                                <th>Year</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="carTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const apiUrl = '/api/cars';

    // 1. READ: Fetch all cars and display them on page load
    document.addEventListener("DOMContentLoaded", fetchCars);

    function fetchCars() {
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('carTableBody');
                tableBody.innerHTML = ''; // Clear existing rows

                data.forEach(car => {
                    const statusBadge = car.available ? 
                        '<span class="badge bg-success">Available</span>' : 
                        '<span class="badge bg-danger">Rented</span>';

                    const row = `
                        <tr>
                            <td>${car.id}</td>
                            <td>${car.make}</td>
                            <td>${car.model}</td>
                            <td>${car.year}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editCar(${car.id}, '${car.make}', '${car.model}', ${car.year}, ${car.available})">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteCar(${car.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            });
    }

    // 2. CREATE / UPDATE: Handle form submission
    document.getElementById('carForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent page reload

        const id = document.getElementById('carId').value;
        const carData = {
            make: document.getElementById('make').value,
            model: document.getElementById('model').value,
            year: document.getElementById('year').value,
            available: document.getElementById('isAvailable').checked
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${apiUrl}/${id}` : apiUrl;

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(carData)
        }).then(() => {
            resetForm();
            fetchCars(); // Refresh the table
        });
    });

    // 3. UPDATE PREP: Load car data into the form when "Edit" is clicked
    function editCar(id, make, model, year, available) {
        document.getElementById('formTitle').innerText = "Edit Car";
        document.getElementById('carId').value = id;
        document.getElementById('make').value = make;
        document.getElementById('model').value = model;
        document.getElementById('year').value = year;
        document.getElementById('isAvailable').checked = available;
        
        document.getElementById('cancelBtn').classList.remove('d-none');
        document.getElementById('saveBtn').innerText = "Update Car";
    }

    // 4. DELETE: Remove a car
    function deleteCar(id) {
        if (confirm('Are you sure you want to delete this car?')) {
            fetch(`${apiUrl}/${id}`, {
                method: 'DELETE'
            }).then(() => fetchCars()); // Refresh the table
        }
    }

    // Helper: Reset the form
    function resetForm() {
        document.getElementById('carForm').reset();
        document.getElementById('carId').value = '';
        document.getElementById('formTitle').innerText = "Add New Car";
        document.getElementById('saveBtn').innerText = "Save Car";
        document.getElementById('cancelBtn').classList.add('d-none');
    }
</script>

</body>
</html>
